%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%                                                                              %
% SU2 configuration file                                                       %
% Case description: Steady-State Axisymmetric Low-Speed Jet (Reversed)         %
% Author: Kareem A.Eldesouki                                                   %
% File Version 8.4.0 "Harrier"                                                 %
%                                                                              %
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% ------------- DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION ------------%
SOLVER= INC_RANS
KIND_TURB_MODEL= SST            
HYBRID_RANSLES= NONE
RESTART_SOL= NO
AXISYMMETRIC= YES

% -------------------- COMPRESSIBLE FREE-STREAM DEFINITION --------------------%
%INIT_OPTION= TD_CONDITIONS
 REF_DIMENSIONALIZATION=  DIMENSIONAL 

INC_DENSITY_INIT = 998.2 
INC_VELOCITY_INIT = (1, 0.0, 0.0) 
MACH_NUMBER = 0.0001
REF_LENGTH= 1.0
REF_AREA= 1.0
FREESTREAM_TURBULENCEINTENSITY= 0.05      % 5% intensity
FREESTREAM_TURB2LAMVISCRATIO= 10.0        % Ratio of tur


% ---- IDEAL GAS, POLYTROPIC, VAN DER WAALS AND PENG ROBINSON CONSTANTS -------%

FLUID_MODEL = CONSTANT_DENSITY
% --------------------------- VISCOSITY MODEL ---------------------------------%
VISCOSITY_MODEL= CONSTANT_VISCOSITY
MU_CONSTANT= 1.002E-3


% -------------------- BOUNDARY CONDITION DEFINITION --------------------------%

MARKER_ISOTHERMAL= ( wall, 288.0)
MARKER_SYM = ( symmetric )
MARKER_INTERNAL= ( internal)
INC_INLET_TYPE= VELOCITY_INLET
MARKER_INLET= ( inlet, 288.0, 2.0, 1.0, 0.0, 0.0 )

INC_OUTLET_TYPE= PRESSURE_OUTLET 
MARKER_OUTLET= ( outlet, 0.0)


MARKER_MONITORING= ( wall )

% ------------- COMMON PARAMETERS DEFINING THE NUMERICAL METHOD --------------%
NUM_METHOD_GRAD= GREEN_GAUSS
CFL_NUMBER= 1.0
CFL_ADAPT= NO
CFL_ADAPT_PARAM= ( 0.1, 1.2, 0.1, 10.0 ) 
% (min, factor_down, factor_up, max)
MAX_DELTA_TIME= 1E6
ITER= 50000
OBJECTIVE_FUNCTION= SURFACE_MASSFLOW

% ------------------------ LINEAR SOLVER DEFINITION ---------------------------%
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ILU_FILL_IN= 0
LINEAR_SOLVER_ERROR= 0.01
LINEAR_SOLVER_ITER= 10

% -------------------- FLOW NUMERICAL METHOD DEFINITION -----------------------%
CONV_NUM_METHOD_FLOW= FDS
MUSCL_FLOW= YES
SLOPE_LIMITER_FLOW= VENKATAKRISHNAN
LOW_MACH_PREC= YES


% -------------------- TURBULENT NUMERICAL METHOD DEFINITION ------------------%
CONV_NUM_METHOD_TURB= SCALAR_UPWIND
MUSCL_TURB= NO
TIME_DISCRE_TURB= EULER_IMPLICIT

% --------------------------- CONVERGENCE PARAMETERS --------------------------%
CONV_RESIDUAL_MINVAL= -12
CONV_STARTITER= 10

% ------------------------- TIME-DEPENDENT SIMULATION -------------------------%
TIME_DOMAIN= NO
%TIME_MARCHING= DUAL_TIME_STEPPING-2ND_ORDER
% Physical time step (seconds) - Adjust based on your jet velocity and mesh size
%TIME_STEP= 0.001
% Total physical time steps to run
%TIME_ITER= 1000
% Maximum internal iterations per physical time step (for convergence)
%INNER_ITER= 50
% ------------------------- INPUT/OUTPUT INFORMATION --------------------------%
MESH_FILENAME= Mesh_Sym_jet.su2
OUTPUT_FILES= (RESTART, PARAVIEW_ASCII, SURFACE_PARAVIEW_ASCII)
TABULAR_FORMAT= CSV
% Remove 'outputs/' prefix if the folder doesn't exist!
SOLUTION_FILENAME= refine_converged
OUTPUT_WRT_FREQ= 200


SCREEN_OUTPUT= (ITER, RMS_PRESSURE, RMS_MOMENTUM_X, RMS_TKE, MASS_FLOW)

